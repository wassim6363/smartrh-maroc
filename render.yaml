services:
  - type: web
    name: smartrh-maroc
    runtime: docker
    plan: free
    branch: main
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: SmartRH Maroc
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: smartrh-maroc-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: PRIVATE_FILESYSTEM_DISK
        value: local
      - key: FORCE_HTTPS
        value: true
      - key: TRUSTED_PROXIES
        value: "*"
      - key: MAIL_MAILER
        value: log
      - key: SEED_DEMO_DATA
        value: false

databases:
  - name: smartrh-maroc-db
    plan: free
    databaseName: smartrh_maroc
    user: smartrh_maroc
